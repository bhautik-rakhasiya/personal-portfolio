<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c63ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0d0d20"/>
  <!-- Workspace / desk scene -->
  <rect x="60" y="60" width="480" height="280" rx="16" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
  <!-- Monitor -->
  <rect x="180" y="90" width="240" height="150" rx="8" fill="#0f0f23" stroke="#6c63ff" stroke-width="1.5"/>
  <rect x="195" y="105" width="210" height="120" rx="4" fill="#111128"/>
  <!-- Screen content -->
  <rect x="210" y="120" width="80" height="6" rx="3" fill="#6c63ff" opacity="0.6"/>
  <rect x="210" y="135" width="120" height="6" rx="3" fill="#e2e8f0" opacity="0.15"/>
  <rect x="210" y="150" width="60" height="6" rx="3" fill="#00d4ff" opacity="0.4"/>
  <rect x="280" y="150" width="90" height="6" rx="3" fill="#a78bfa" opacity="0.3"/>
  <rect x="210" y="165" width="170" height="6" rx="3" fill="#e2e8f0" opacity="0.1"/>
  <rect x="210" y="180" width="100" height="6" rx="3" fill="#6c63ff" opacity="0.4"/>
  <rect x="210" y="195" width="130" height="6" rx="3" fill="#00d4ff" opacity="0.3"/>
  <!-- Monitor stand -->
  <rect x="280" y="240" width="40" height="25" fill="#1a1a2e"/>
  <rect x="260" y="265" width="80" height="6" rx="3" fill="#1a1a2e"/>
  <!-- Keyboard -->
  <rect x="210" y="285" width="180" height="30" rx="6" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <!-- Coffee cup -->
  <rect x="430" y="270" width="30" height="35" rx="4" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1" opacity="0.5"/>
  <rect x="460" y="278" width="12" height="18" rx="6" fill="none" stroke="#6c63ff" stroke-width="1" opacity="0.3"/>
  <!-- Steam -->
  <path d="M440 265 Q443 255 440 248" fill="none" stroke="#64748b" stroke-width="1" opacity="0.3"/>
  <path d="M448 262 Q451 250 448 242" fill="none" stroke="#64748b" stroke-width="1" opacity="0.2"/>
  <!-- Plant -->
  <rect x="100" y="260" width="24" height="40" rx="4" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <circle cx="112" cy="252" r="18" fill="#059669" opacity="0.3"/>
  <circle cx="105" cy="245" r="12" fill="#059669" opacity="0.25"/>
  <circle cx="120" cy="248" r="10" fill="#10b981" opacity="0.2"/>
  <text x="300" y="380" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" opacity="0.5">My Workspace</text>
</svg>