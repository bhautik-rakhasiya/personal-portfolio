      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0d0d20"/>
  <!-- Team / collaboration scene -->
  <!-- Central hub -->
  <circle cx="300" cy="200" r="40" fill="url(#bg3)" opacity="0.2" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="300" y="205" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600" fill="#6c63ff" text-anchor="middle" opacity="0.8">TEAM</text>
