  <text x="300" y="75" font-family="'Inter', sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">API</text>

  <line x1="340" y1="200" x2="450" y2="130" stroke="#6c63ff" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>
