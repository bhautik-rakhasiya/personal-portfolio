  <text x="130" y="285" font-family="'Inter', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">CI/CD</text>

  <line x1="260" y1="190" x2="130" y2="130" stroke="#6c63ff" stroke-width="1" opacity="0.3" stroke-dasharray="4 4"/>
