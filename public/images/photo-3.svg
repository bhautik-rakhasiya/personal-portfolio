  <circle cx="50" cy="50" r="3" fill="#6c63ff" opacity="0.3"/>
  <circle cx="550" cy="50" r="3" fill="#00d4ff" opacity="0.3"/>
  <circle cx="50" cy="370" r="3" fill="#a78bfa" opacity="0.3"/>
  <circle cx="550" cy="370" r="3" fill="#6c63ff" opacity="0.3"/>
  <text x="300" y="388" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" opacity="0.5">System Architecture</text>
