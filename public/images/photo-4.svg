<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0d0d20"/>
  <!-- Graduation / education scene -->
  <!-- Cap -->
  <polygon points="300,80 220,130 300,150 380,130" fill="url(#bg4)" opacity="0.6"/>
  <rect x="270" y="130" width="60" height="8" fill="#6c63ff" opacity="0.7"/>
  <polygon points="300,138 220,160 300,175 380,160" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1"/>
  <!-- Tassel -->
  <line x1="300" y1="130" x2="340" y2="170" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="340" cy="175" r="5" fill="#fbbf24" opacity="0.7"/>
  <!-- Book -->
  <rect x="200" y="210" width="200" height="130" rx="4" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="210" x2="300" y2="340" stroke="#6c63ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Book lines left -->
  <rect x="220" y="230" width="60" height="4" rx="2" fill="#e2e8f0" opacity="0.12"/>
  <rect x="220" y="245" width="50" height="4" rx="2" fill="#e2e8f0" opacity="0.1"/>
  <rect x="220" y="260" width="65" height="4" rx="2" fill="#6c63ff" opacity="0.2"/>
  <rect x="220" y="275" width="40" height="4" rx="2" fill="#e2e8f0" opacity="0.1"/>
  <rect x="220" y="290" width="55" height="4" rx="2" fill="#00d4ff" opacity="0.15"/>
  <rect x="220" y="305" width="45" height="4" rx="2" fill="#e2e8f0" opacity="0.08"/>
  <!-- Book lines right -->
  <rect x="320" y="230" width="60" height="4" rx="2" fill="#e2e8f0" opacity="0.12"/>
  <rect x="320" y="245" width="50" height="4" rx="2" fill="#6c63ff" opacity="0.2"/>
  <rect x="320" y="260" width="65" height="4" rx="2" fill="#e2e8f0" opacity="0.1"/>
  <rect x="320" y="275" width="40" height="4" rx="2" fill="#00d4ff" opacity="0.15"/>
  <rect x="320" y="290" width="55" height="4" rx="2" fill="#e2e8f0" opacity="0.1"/>
  <rect x="320" y="305" width="45" height="4" rx="2" fill="#e2e8f0" opacity="0.08"/>
  <!-- CGPA badge -->
  <circle cx="480" cy="100" r="35" fill="url(#bg4)" opacity="0.2" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="480" y="96" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" fill="#00d4ff" text-anchor="middle">8.64</text>
  <text x="480" y="112" font-family="'Inter', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">CGPA</text>
  <!-- VVP badge -->
  <rect x="80" y="250" width="80" height="36" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <text x="120" y="272" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle" opacity="0.7">VVP</text>
  <!-- Decorative -->
  <circle cx="80" cy="80" r="20" fill="#6c63ff" opacity="0.06"/>
  <circle cx="520" cy="320" r="30" fill="#00d4ff" opacity="0.06"/>
  <text x="300" y="385" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" opacity="0.5">Education Journey</text>
</svg>