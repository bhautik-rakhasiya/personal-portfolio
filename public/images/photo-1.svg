<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="#0d0d20"/>
  <!-- Code editor mockup -->
  <rect x="40" y="40" width="520" height="320" rx="12" fill="#1a1a2e" stroke="#6c63ff" stroke-width="1" opacity="0.8"/>
  <!-- Title bar dots -->
  <circle cx="70" cy="65" r="6" fill="#ff5f57"/>
  <circle cx="90" cy="65" r="6" fill="#febc2e"/>
  <circle cx="110" cy="65" r="6" fill="#28c840"/>
  <!-- Code lines -->
  <rect x="70" y="100" width="120" height="8" rx="4" fill="#6c63ff" opacity="0.6"/>
  <rect x="200" y="100" width="80" height="8" rx="4" fill="#00d4ff" opacity="0.5"/>
  <rect x="90" y="125" width="200" height="8" rx="4" fill="#e2e8f0" opacity="0.2"/>
  <rect x="90" y="150" width="160" height="8" rx="4" fill="#6c63ff" opacity="0.4"/>
  <rect x="260" y="150" width="100" height="8" rx="4" fill="#00d4ff" opacity="0.4"/>
  <rect x="110" y="175" width="240" height="8" rx="4" fill="#e2e8f0" opacity="0.15"/>
  <rect x="110" y="200" width="180" height="8" rx="4" fill="#a78bfa" opacity="0.4"/>
  <rect x="90" y="225" width="140" height="8" rx="4" fill="#6c63ff" opacity="0.5"/>
  <rect x="70" y="250" width="100" height="8" rx="4" fill="#e2e8f0" opacity="0.2"/>
  <rect x="90" y="275" width="280" height="8" rx="4" fill="#00d4ff" opacity="0.3"/>
  <rect x="70" y="300" width="60" height="8" rx="4" fill="#6c63ff" opacity="0.6"/>
  <!-- Floating elements -->
  <circle cx="480" cy="140" r="30" fill="url(#bg1)" opacity="0.15"/>
  <circle cx="500" cy="280" r="20" fill="#00d4ff" opacity="0.1"/>
  <text x="300" y="380" font-family="'Inter', sans-serif" font-size="11" fill="#64748b" text-anchor="middle" opacity="0.5">Coding in Progress</text>
</svg>